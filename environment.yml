name: obstacle-clustering
channels:
  - conda-forge
  - nodefaults

dependencies:
  # Core scientific computing
  - python=3.11
  - numpy>=1.24
  - scipy>=1.11
  - scikit-learn>=1.3

  # Geospatial
  - geopandas>=0.14
  - shapely>=2.0
  - pyproj>=3.6
  - folium>=0.15
  - osmnx>=1.7

  # Visualization
  - matplotlib>=3.8
  - seaborn>=0.13

  # Jupyter environment
  - jupyterlab>=4.0
  - ipywidgets>=8.0
  - notebook>=7.0

  # Utilities
  - pandas>=2.1
  - requests>=2.31
  - python-dotenv>=1.0
  - tqdm>=4.66
